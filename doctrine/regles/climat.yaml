climat.zone_climatique:
  id: climat.zone_climatique
  description: Zone climatique du bâtiment
  type: string

climat.tbase:
  id: climat.tbase
  description: Température extérieure de base
  type: number
  unite: °C
  dependances:
    - climat.zone_climatique

climat.nj:
  id: climat.nj
  description: Nombre de jours
  type: number
  unite: j
  scopes: [mois]

climat.epv:
  id: climat.epv
  description: Ensoleillement potentiel
  type: number
  unite: kWh/m²
  scopes: [mois]
  dependances:
    - climat.zone_climatique
    - enveloppe.inertie
    - enveloppe.parois_anciennes

climat.e_ch:
  id: climat.e_ch
  description: Ensoleillement reçu en période de chauffage
  type: number
  unite: kWh/m²
  scopes: [mois, scenario]
  dependances:
    - climat.zone_climatique
    - enveloppe.inertie
    - enveloppe.parois_anciennes

climat.e_fr:
  id: climat.e_fr
  description: Ensoleillement reçu en période de refroidissement
  type: number
  unite: kWh/m²
  scopes: [mois, scenario]
  dependances:
    - climat.zone_climatique
    - enveloppe.inertie
    - enveloppe.parois_anciennes

climat.nref_ch:
  id: climat.nref_ch
  description: Nombre d'heures de chauffage
  type: number
  unite: h
  scopes: [mois, scenario]
  dependances:
    - climat.zone_climatique
    - enveloppe.inertie
    - enveloppe.parois_anciennes

climat.nref_fr:
  id: climat.nref_fr
  description: Nombre d'heures de refroidissement
  type: number
  unite: h
  scopes: [mois, scenario]
  dependances:
    - climat.zone_climatique
    - enveloppe.inertie
    - enveloppe.parois_anciennes

climat.dh_ch:
  id: climat.dh_ch
  description: Degrés-heures de chauffage
  type: number
  unite: °C.h
  scopes: [mois, scenario]
  dependances:
    - climat.zone_climatique
    - enveloppe.inertie
    - enveloppe.parois_anciennes

climat.dh14:
  id: climat.dh14
  description: Degrés-heures de base 14 sur la saison de chauffe complète
