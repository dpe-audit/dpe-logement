$id: https://schemas.open-dpe.fr/ecs/generateur/generateur-thermodynamique
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur thermodynamique
type: object
properties:
  type:
    enum:
      - cet_air_ambiant
      - cet_air_exterieur
      - cet_air_extrait
      - pac_double_service
  energie:
    const: electricite
  position:
    type: object
    properties:
      reseau_chaleur_id:
        const: null
        default: null
      position_chauffe_eau:
        const: null
        default: null
  signaletique:
    type: object
    properties:
      label:
        const: null
        default: null
required:
  - type
  - energie
  - position
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - title: Chauffe-eau thermodynamique
    type: object
    properties:
      type:
        enum: [cet_air_ambiant, cet_air_exterieur, cet_air_extrait]
      bienergie:
        const: null
        default: null
      position:
        type: object
        properties:
          generateur_mixte_id:
            const: null
            default: null
          generateur_multi_batiment:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          mode_combustion:
            const: null
            default: null
          presence_ventouse:
            const: null
            default: null
          pveilleuse:
            const: null
            default: null
          qp0:
            const: null
            default: null
          rpn:
            const: null
            default: null
    required:
      - type
      - position
      - signaletique
  - title: PAC double service
    type: object
    properties:
      type:
        const: pac_double_service
      bienergie:
        const: null
        default: null
      signaletique:
        type: object
        properties:
          mode_combustion:
            const: null
            default: null
          presence_ventouse:
            const: null
            default: null
          pveilleuse:
            const: null
            default: null
          qp0:
            const: null
            default: null
          rpn:
            const: null
            default: null
    required:
      - type
      - position
      - signaletique
  - title: PAC hybride
    type: object
    properties:
      type:
        const: pac_double_service
      bienergie:
        not:
          const: null
    required:
      - type
      - bienergie
