$id: https://schemas.open-dpe.fr/ecs/generateur/generateur-electrique
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur électrique
type: object
properties:
  type:
    enum: [chaudiere, chauffe_eau]
  energie:
    const: electricite
  bienergie:
    const: null
    default: null
  position:
    type: object
    properties:
      reseau_chaleur_id:
        const: null
        default: null
  signaletique:
    type: object
    properties:
      cop:
        const: null
        default: null
      mode_combustion:
        const: null
        default: null
      presence_ventouse:
        const: null
        default: null
      pveilleuse:
        const: null
        default: null
      qp0:
        const: null
        default: null
      rpn:
        const: null
        default: null
required:
  - type
  - energie
  - position
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - title: Chaudière électrique
    type: object
    properties:
      type:
        const: chaudiere
      position:
        type: object
        properties:
          position_chauffe_eau:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          label:
            const: null
            default: null
    required:
      - type
      - position
      - signaletique
  - title: Chauffe-eau électrique
    type: object
    properties:
      type:
        const: chauffe_eau
      position:
        type: object
        properties:
          position_chauffe_eau:
            type: string
          generateur_collectif:
            const: false
            default: false
          generateur_multi_batiment:
            const: false
            default: false
          generateur_mixte_id:
            const: null
            default: null
      required:
        - position_chauffe_eau
    required:
      - type
      - position
      - signaletique
