$id: https://schemas.open-dpe.fr/ecs/generateur/generateur-combustion
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur à combustion
type: object
properties:
  type:
    enum: [chaudiere, poele_bouilleur, chauffe_eau]
  energie:
    not:
      enum: [electricite, reseau_chaleur]
  bienergie:
    const: null
    default: null
  position:
    type: object
    properties:
      reseau_chaleur_id:
        const: null
        default: null
  signaletique:
    type: object
    properties:
      cop:
        const: null
        default: null
      label:
        const: null
        default: null
required:
  - type
  - energie
  - position
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - title: Chaudière à combustion
    type: object
    properties:
      type:
        const: chaudiere
      position:
        type: object
        properties:
          position_chauffe_eau:
            const: null
            default: null
    required:
      - type
      - position
  - title: Poèle à bois bouilleur
    type: object
    properties:
      type:
        const: poele_bouilleur
      energie:
        enum: [bois_buche, bois_plaquette, bois_granule]
      position:
        type: object
        properties:
          position_chauffe_eau:
            const: null
            default: null
          generateur_collectif:
            const: false
            default: false
          generateur_multi_batiment:
            const: false
            default: false
    required:
      - type
      - energie
      - position
  - title: Chauffe-eau gaz
    type: object
    properties:
      type:
        const: chauffe_eau
      energie:
        enum: [gaz_naturel, gpl]
      position:
        type: object
        properties:
          generateur_collectif:
            const: false
            default: false
          generateur_multi_batiment:
            const: false
            default: false
          generateur_mixte_id:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          mode_combustion:
            enum: [standard, condensation]
    required:
      - type
      - energie
      - position
      - signaletique
