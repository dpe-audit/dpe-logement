$id: https://schemas.open-dpe.fr/ecs/generateur
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur d'eau chaude sanitaire
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type de générateur d'eau chaude sanitaire
    type: [string, "null"]
    x-enum: ecs:type-generateur
    enum:
      - chauffe_eau
      - chaudiere
      - cet_air_ambiant
      - cet_air_exterieur
      - cet_air_extrait
      - pac_double_service
      - poele_bouilleur
      - reseau_chaleur
      - null
  energie:
    title: Energie
    type: [string, "null"]
    x-enum: energie
    enum:
      - electricite
      - gaz_naturel
      - gpl
      - fioul
      - charbon
      - bois_buche
      - bois_plaquette
      - bois_granule
      - reseau_chaleur
      - null
  annee_installation:
    $ref: /common/primitives#/$defs/annee_installation
  position:
    title: Position
    type: object
    unevaluatedProperties: false
    properties:
      position_chauffe_eau:
        title: Position du chauffe-eau
        type: [string, "null"]
        x-enum: ecs:position-chauffe-eau
        enum: [chauffe_eau_vertical, chauffe_eau_horizontal, null]
      generateur_collectif:
        title: Générateur collectif d'eau chaude sanitaire
        type: boolean
      generateur_multi_batiment:
        title: Générateur multi bâtiment
        type: boolean
      position_volume_chauffe:
        title: Position du générateur à l'intérieur du volume chauffé
        type: boolean
      generateur_mixte_id:
        title: Identifiant du générateur mixte
        anyOf:
          - $ref: /common/primitives#/$defs/id
          - const: null
      reseau_chaleur_id:
        title: Identifiant du réseau de chaleur
        type: [string, "null"]
    required:
      - generateur_collectif
      - generateur_multi_batiment
      - position_volume_chauffe
    oneOf:
      - title: Générateur individuel
        type: object
        properties:
          generateur_collectif:
            const: false
          generateur_multi_batiment:
            const: false
          reseau_chaleur_id:
            const: null
        required:
          - generateur_collectif
          - generateur_multi_batiment
      - title: Générateur collectif
        type: object
        properties:
          generateur_collectif:
            const: true
          position_volume_chauffe:
            const: false
        required:
          - generateur_collectif
          - position_volume_chauffe
  signaletique:
    title: Fiche signalétique
    type: object
    unevaluatedProperties: false
    properties:
      volume_stockage:
        title: Volume de stockage en litres
        type: [number, "null"]
        minimum: 0
      pn:
        title: Puissance nominale en kW
        type: [number, "null"]
        exclusiveMinimum: 0
      label:
        title: Label
        type: [string, "null"]
        x-enum: ecs:label-generateur
        enum:
          - ne_performance_a
          - ne_performance_b
          - ne_performance_c
          - null
      cop:
        title: Coefficient de performance énergétique
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 10
      mode_combustion:
        title: Mode de combustion
        type: [string, "null"]
        x-enum: ecs:mode-combustion
        enum:
          - standard
          - basse_temperature
          - condensation
          - null
      presence_ventouse:
        title: Présence d'une ventouse
        type: [boolean, "null"]
      pveilleuse:
        title: Puissance de la veilleuse en W
        type: [number, "null"]
        minimum: 0
      qp0:
        title: Pertes à l'arrêt en W
        type: [number, "null"]
        exclusiveMinimum: 0
      rpn:
        title: Rendement à puissance nominale sur PCI en %
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 150
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      pn:
        title: Puissance nominale en kW
        type: number
        exclusiveMinimum: 0
      pdim:
        title: Puissance de dimensionnement en kW
        type: number
        exclusiveMinimum: 0
      pecs:
        title: Puissance de dimensionnement du besoin d'eau chaude sanitaire en kW
        type: number
        exclusiveMinimum: 0
      rg:
        title: Rendement de génération moyen
        type: number
        exclusiveMinimum: 0
      cop:
        title: Coefficient de performance énergétique
        type: [number, "null"]
        exclusiveMinimum: 0
      rpn:
        title: Rendement à pleine charge exprimée en %PCI
        type: [number, "null"]
        exclusiveMinimum: 0
      qp0:
        title: Pertes à l'arrêt en W
        type: [number, "null"]
        exclusiveMinimum: 0
      pveilleuse:
        title: Puissance de la veilleuse en W
        type: [number, "null"]
        exclusiveMinimum: 0
      rdim:
        $ref: /common/primitives#/$defs/rdim
      pertes:
        $ref: /common/components#/$defs/pertes
      consommations:
        $ref: /common/components#/$defs/consommations
required:
  - id
  - description
  - type
  - energie
  - annee_installation
  - position
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - title: Générateur à combustion
    type: object
    properties:
      type:
        enum:
          - chaudiere
          - poele_bouilleur
          - chauffe_eau
      energie:
        not:
          enum: [electricite, reseau_chaleur]
      position:
        type: object
        properties:
          reseau_chaleur_id:
            const: null
      signaletique:
        type: object
        properties:
          cop:
            const: null
          label:
            const: null
    required:
      - type
      - energie
      - position
      - signaletique
    oneOf:
      - title: Chaudière à combustion
        type: object
        properties:
          type:
            const: chaudiere
          position:
            type: object
            properties:
              position_chauffe_eau:
                const: null
        required:
          - type
          - position
      - title: Poèle à bois bouilleur
        type: object
        properties:
          type:
            const: poele_bouilleur
          energie:
            enum: [bois_buche, bois_plaquette, bois_granule]
          position:
            type: object
            properties:
              position_chauffe_eau:
                const: null
        required:
          - type
          - energie
          - position
      - title: Chauffe-eau à combustion
        type: object
        properties:
          type:
            const: chauffe_eau
          position:
            type: object
            properties:
              generateur_collectif:
                const: false
              generateur_multi_batiment:
                const: false
              generateur_mixte_id:
                const: null
          signaletique:
            type: object
            properties:
              mode_combustion:
                enum: [standard, condensation]
        required:
          - type
          - position
          - signaletique
  - title: Générateur électrique
    type: object
    properties:
      type:
        enum: [chaudiere, chauffe_eau]
      energie:
        const: electricite
      position:
        type: object
        properties:
          reseau_chaleur_id:
            const: null
      signaletique:
        type: object
        properties:
          cop:
            const: null
          mode_combustion:
            const: null
          presence_ventouse:
            const: null
          pveilleuse:
            const: null
          qp0:
            const: null
          rpn:
            const: null
    required:
      - type
      - energie
      - position
      - signaletique
    oneOf:
      - title: Chaudière électrique
        type: object
        properties:
          type:
            const: chaudiere
          position:
            type: object
            properties:
              position_chauffe_eau:
                const: null
          signaletique:
            type: object
            properties:
              label:
                const: null
        required:
          - type
          - position
          - signaletique
      - title: Chauffe-eau électrique
        type: object
        properties:
          type:
            const: chauffe_eau
          position:
            type: object
            properties:
              generateur_collectif:
                const: false
              generateur_multi_batiment:
                const: false
              generateur_mixte_id:
                const: null
        required:
          - type
          - position
  - title: Générateur thermodynamique
    type: object
    properties:
      type:
        enum:
          - cet_air_ambiant
          - cet_air_exterieur
          - cet_air_extrait
          - pac_double_service
      energie:
        const: electricite
      position:
        type: object
        properties:
          reseau_chaleur_id:
            const: null
          position_chauffe_eau:
            const: null
      signaletique:
        type: object
        properties:
          label:
            const: null
    required:
      - type
      - energie
      - position
      - signaletique
    oneOf:
      - title: Chauffe-eau thermodynamique
        type: object
        properties:
          type:
            enum: [cet_air_ambiant, cet_air_exterieur, cet_air_extrait]
          position:
            type: object
            properties:
              generateur_mixte_id:
                const: null
          signaletique:
            type: object
            properties:
              mode_combustion:
                const: null
              presence_ventouse:
                const: null
              pveilleuse:
                const: null
              qp0:
                const: null
              rpn:
                const: null
        required:
          - type
          - position
          - signaletique
      - title: PAC double service
        properties:
          type:
            const: pac_double_service
        required:
          - type
  - title: Réseau de chaleur
    type: object
    properties:
      type:
        const: reseau_chaleur
      energie:
        const: reseau_chaleur
      position:
        type: object
        properties:
          generateur_collectif:
            const: true
          generateur_multi_batiment:
            const: true
          position_volume_chauffe:
            const: false
          generateur_mixte_id:
            const: null
      signaletique:
        type: object
        properties:
          pn:
            const: null
          cop:
            const: null
          label:
            const: null
          mode_combustion:
            const: null
          presence_ventouse:
            const: null
          pveilleuse:
            const: null
          qp0:
            const: null
          rpn:
            const: null
    required:
      - type
      - energie
      - position
      - signaletique
  - title: Générateur collectif inconnu
    type: object
    properties:
      type:
        const: null
      energie:
        const: null
      position:
        type: object
        properties:
          generateur_collectif:
            const: true
          position_volume_chauffe:
            const: false
          position_chauffe_eau:
            const: null
          generateur_mixte_id:
            const: null
          reseau_chaleur_id:
            const: null
      signaletique:
        type: object
        properties:
          volume_stockage:
            const: null
          pn:
            const: null
          cop:
            const: null
          label:
            const: null
          mode_combustion:
            const: null
          presence_ventouse:
            const: null
          pveilleuse:
            const: null
          qp0:
            const: null
          rpn:
            const: null
    required:
      - type
      - energie
      - position
      - signaletique
