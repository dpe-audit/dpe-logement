$id: https://schemas.open-dpe.fr/ecs/generateur
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur d'eau chaude sanitaire
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type de générateur d'eau chaude sanitaire
    type: [string, "null"]
    x-enum: ecs:type-generateur
    enum:
      - chauffe_eau
      - chaudiere
      - cet_air_ambiant
      - cet_air_exterieur
      - cet_air_extrait
      - pac_double_service
      - poele_bouilleur
      - reseau_chaleur
      - null
  energie:
    title: Energie
    type: [string, "null"]
    x-enum: energie
    enum:
      - electricite
      - gaz_naturel
      - gpl
      - fioul
      - charbon
      - bois_buche
      - bois_plaquette
      - bois_granule
      - reseau_chaleur
      - null
  bienergie:
    title: Energie secondaire
    type: [string, "null"]
    x-enum: energie
    enum: [gaz_naturel, gpl, fioul, null]
  annee_installation:
    $ref: /common/primitives#/$defs/annee_installation
  position:
    title: Position
    type: object
    unevaluatedProperties: false
    properties:
      position_chauffe_eau:
        title: Position du chauffe-eau
        type: [string, "null"]
        x-enum: ecs:position-chauffe-eau
        enum: [chauffe_eau_vertical, chauffe_eau_horizontal, null]
      generateur_collectif:
        title: Générateur collectif d'eau chaude sanitaire
        type: boolean
      generateur_multi_batiment:
        title: Générateur multi bâtiment
        type: boolean
      position_volume_chauffe:
        title: Position du générateur à l'intérieur du volume chauffé
        type: boolean
      generateur_mixte_id:
        title: Identifiant du générateur mixte
        anyOf:
          - $ref: /common/primitives#/$defs/id
          - const: null
      reseau_chaleur_id:
        title: Identifiant du réseau de chaleur
        type: [string, "null"]
    required:
      - generateur_collectif
      - generateur_multi_batiment
      - position_volume_chauffe
    oneOf:
      - title: Générateur individuel
        type: object
        properties:
          generateur_collectif:
            const: false
          generateur_multi_batiment:
            const: false
          reseau_chaleur_id:
            const: null
            default: null
        required:
          - generateur_collectif
          - generateur_multi_batiment
      - title: Générateur collectif
        type: object
        properties:
          generateur_collectif:
            const: true
          position_volume_chauffe:
            const: false
        required:
          - generateur_collectif
          - position_volume_chauffe
  stockage:
    title: Stockage
    type: [object, "null"]
    additionalProperties: false
    properties:
      type:
        title: Type de stockage
        type: [string, "null"]
        x-enum: ecs:type-stockage
        enum: [integre, independant, null]
      volume:
        title: Volume de stockage en l
        type: number
        exclusiveMinimum: 0
      position_volume_chauffe:
        title: Position à l'intérieur volume chauffé
        type: boolean
    required:
      - type
      - volume
      - position_volume_chauffe
  signaletique:
    title: Fiche signalétique
    type: object
    unevaluatedProperties: false
    properties:
      pn:
        title: Puissance nominale en kW
        type: [number, "null"]
        exclusiveMinimum: 0
      label:
        title: Label
        type: [string, "null"]
        x-enum: ecs:label-generateur
        enum:
          - ne_performance_a
          - ne_performance_b
          - ne_performance_c
          - null
      cop:
        title: Coefficient de performance énergétique
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 10
      mode_combustion:
        title: Mode de combustion
        type: [string, "null"]
        x-enum: ecs:mode-combustion
        enum:
          - standard
          - basse_temperature
          - condensation
          - null
      presence_ventouse:
        title: Présence d'une ventouse
        type: [boolean, "null"]
      pveilleuse:
        title: Puissance de la veilleuse en W
        type: [number, "null"]
        minimum: 0
      qp0:
        title: Pertes à l'arrêt en kW
        type: [number, "null"]
        exclusiveMinimum: 0
      rpn:
        title: Rendement à puissance nominale sur PCI
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 150
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      pn:
        title: Puissance nominale en kW
        type: number
        exclusiveMinimum: 0
      pdim:
        title: Puissance de dimensionnement en kW
        type: number
        exclusiveMinimum: 0
      pecs:
        title: Puissance de dimensionnement du besoin d'eau chaude sanitaire en kW
        type: number
        exclusiveMinimum: 0
      paux:
        title: Puissance des auxiliaires en W
        type: number
        minimum: 0
      cop:
        title: Coefficient de performance énergétique
        type: [number, "null"]
        exclusiveMinimum: 0
      rpn:
        title: Rendement à pleine charge sur PCI
        type: [number, "null"]
        exclusiveMinimum: 0
      qp0:
        title: Pertes à l'arrêt en kW
        type: [number, "null"]
        exclusiveMinimum: 0
      pveilleuse:
        title: Puissance de la veilleuse en W
        type: [number, "null"]
        exclusiveMinimum: 0
      rdim:
        $ref: /common/primitives#/$defs/rdim
      pertes:
        $ref: /common/components#/$defs/pertes
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - pn
      - pdim
      - pecs
      - paux
      - cop
      - rpn
      - qp0
      - pveilleuse
required:
  - id
  - description
  - type
  - energie
  - annee_installation
  - position
  - stockage
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - $ref: /ecs/generateur/generateur-combustion
  - $ref: /ecs/generateur/generateur-electrique
  - $ref: /ecs/generateur/generateur-thermodynamique
  - $ref: /ecs/generateur/reseau-chaleur
  - $ref: /ecs/generateur/generateur-inconnu
