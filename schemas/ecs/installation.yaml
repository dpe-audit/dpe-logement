$id: https://schemas.open-dpe.fr/ecs/installation
$schema: https://json-schema.org/draft/2020-12/schema
title: Installation d'eau chaude sanitaire
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  surface:
    $ref: /common/primitives#/$defs/surface
  systemes:
    title: Systèmes associés
    type: array
    minItems: 1
    maxItems: 2
    items:
      $ref: /ecs/systeme
  solaire_thermique:
    title: Solaire thermique
    type: [object, "null"]
    additionalProperties: false
    properties:
      usage:
        title: Usages couverts par le solaire thermique
        type: string
        x-enum: ecs:usage-solaire
        enum: [ecs, chauffage_ecs]
      annee_installation:
        $ref: /common/primitives#/$defs/annee_installation
      fecs:
        title: Facteur de couverture solaire
        type: [number, "null"]
        minimum: 0
        maximum: 1
    required:
      - usage
      - annee_installation
      - fecs
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      fecs:
        title: Facteur de couverture solaire
        type: number
      iecs:
        title: Inverse du rendement moyen
        type: number
      rdim:
        $ref: /common/primitives#/$defs/rdim
      pertes:
        $ref: /common/components#/$defs/pertes
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - fecs
      - iecs
      - rdim
      - pertes
      - consommations
required:
  - id
  - description
  - surface
  - systemes
  - solaire_thermique
