$id: https://schemas.open-dpe.fr/ecs/systeme
$schema: https://json-schema.org/draft/2020-12/schema
title: Système d'eau chaude sanitaire
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  generateur_id:
    $ref: /common/primitives#/$defs/id
  installation_id:
    $ref: /common/primitives#/$defs/id
  reseau:
    title: Réseau de distribution d'eau chaude sanitaire
    type: object
    additionalProperties: false
    properties:
      alimentation_contigue:
        title: Alimentation contigüe
        type: boolean
      niveaux_desservis:
        title: Nombre de niveaux desservis
        type: integer
        minimum: 1
      isolation:
        title: Isolation du réseau
        type: [boolean, "null"]
      bouclage:
        title: Type de bouclage
        type: [string, "null"]
        x-enum: ecs:bouclage-reseau
        enum: [non_boucle, boucle, trace, null]
    required:
      - alimentation_contigue
      - niveaux_desservis
      - isolation
      - bouclage
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      paux:
        title: Puissance des auxiliaires en W
        type: number
      iecs:
        title: Inverse du rendement moyen
        type: number
      rd:
        title: Rendement de distribution moyen
        type: number
      rs:
        title: Rendement de stockage moyen
        type: number
      rg:
        title: Rendement de génération moyen
        type: number
      rgs:
        title: Rendement de génération et de stockage moyen
        type: number
      rdim:
        $ref: /common/primitives#/$defs/rdim
      pertes:
        $ref: /common/components#/$defs/pertes
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - paux
      - iecs
      - rd
      - rs
      - rg
      - rgs
      - rdim
      - pertes
      - consommations
required:
  - id
  - description
  - generateur_id
  - installation_id
  - reseau
