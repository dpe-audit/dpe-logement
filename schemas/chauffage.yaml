$id: https://schemas.open-dpe.fr/chauffage
$schema: https://json-schema.org/draft/2020-12/schema
title: Chauffage
type: object
additionalProperties: false
properties:
  generateurs:
    title: Liste des générateurs
    type: array
    minItems: 1
    items:
      $ref: /chauffage/generateur
  installations:
    title: Liste des installations
    type: array
    minItems: 1
    items:
      $ref: /chauffage/installation
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      f:
        title: Fraction des besoins de chauffage couverts par les apports gratuits
        type: number
        minimum: 0
        maximum: 1
      ai:
        title: Apports internes
        $ref: /common/primitives#/$defs/apports
      as:
        title: Apports solaires
        $ref: /common/primitives#/$defs/apports
      bef:
        $ref: /common/primitives#/$defs/bef
      ich:
        title: Inverse du rendement moyen
        type: number
        minimum: 0
      pertes:
        $ref: /common/components#/$defs/pertes
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - effet_joule
      - f
      - ai
      - as
      - bef
      - ich
      - pertes
      - consommations
required:
  - generateurs
  - installations
