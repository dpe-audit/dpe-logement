$id: https://schemas.open-dpe.fr/chauffage/systeme
$schema: https://json-schema.org/draft/2020-12/schema
title: Système de chauffage
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type de système
    type: string
    x-enum: chauffage:type
    enum: [central, divise]
  generateur_id:
    $ref: /common/primitives#/$defs/id
  reseau:
    title: Réseau de distribution
    type: [object, "null"]
    unevaluatedProperties: false
    properties:
      type_distribution:
        title: Type de distribution
        type: string
        x-enum: chauffage:type-distribution
        enum: [hydraulique, aeraulique]
      temperature_distribution:
        title: Température de distribution de l'émetteur de chaleur
        type: [string, "null"]
        x-enum: chauffage:temperature-distribution
        enum: [basse, moyenne, haute, null]
      presence_fluide_frigorigene:
        title: Distribution avec fluide frigorigène
        type: boolean
      presence_circulateur_externe:
        title: Présence d'un circulateur externe
        type: boolean
      niveaux_desservis:
        title: Nombre de niveaux desservis par le réseau
        type: integer
        minimum: 1
      isolation:
        title: Isolation du réseau
        type: [boolean, "null"]
      emetteurs:
        title: Liste des émetteurs
        type: array
        items:
          $ref: /chauffage/emetteur
    required:
      - type_distribution
      - presence_fluide_frigorigene
      - presence_circulateur_externe
      - niveaux_desservis
      - isolation
      - emetteurs
    discriminator:
      propertyName: type_distribution
    oneOf:
      - title: Chauffage central avec distribution hydraulique
        type: object
        properties:
          type_distribution:
            const: hydraulique
          emetteurs:
            type: array
            minItems: 1
        required:
          - type_distribution
          - temperature_distribution
          - emetteurs
      - title: Chauffage central avec distribution aéraulique
        type: object
        properties:
          type_distribution:
            const: aeraulique
          temperature_distribution:
            const: null
            default: null
          emetteurs:
            type: array
            minItems: 0
            maxItems: 0
        required:
          - type_distribution
          - emetteurs
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      ich:
        title: Inverse du rendement du système
        type: number
      rd:
        title: Rendement de distribution
        type: number
      re:
        title: Rendement d'émission
        type: number
      rg:
        title: Rendement de génération
        type: number
      rr:
        title: Rendement de régulation
        type: number
      rdim:
        $ref: /common/primitives#/$defs/rdim
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - ich
      - rd
      - re
      - rg
      - rr
      - rdim
      - consommations
required:
  - id
  - description
  - type
  - generateur_id
discriminator:
  propertyName: type
oneOf:
  - title: Système de chauffage central
    properties:
      type:
        const: central
      reseau:
        type: object
    required:
      - type
      - reseau
  - title: Système de chauffage divisé
    properties:
      type:
        const: divise
      reseau:
        type: null
        default: null
    required:
      - type
