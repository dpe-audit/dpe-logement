$id: https://schemas.open-dpe.fr/chauffage/emetteur
$schema: https://json-schema.org/draft/2020-12/schema
title: Émetteur de chaleur
type: object
additionalProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type d'émetteur de chauffage
    type: string
    x-enum: chauffage:type-emetteur
    enum:
      - plancher_chauffant
      - plafond_chauffant
      - radiateur_monotube
      - radiateur_bitube
      - radiateur
  temperature_distribution:
    title: Température de distribution de l'émetteur de chaleur
    type: string
    x-enum: chauffage:temperature-distribution
    enum:
      - basse
      - moyenne
      - haute
  presence_robinet_thermostatique:
    title: Présence d'un robinet thermostatique
    type: boolean
  annee_installation:
    $ref: /common/primitives#/$defs/annee_installation
required:
  - id
  - description
  - type
  - temperature_distribution
  - presence_robinet_thermostatique
  - annee_installation
