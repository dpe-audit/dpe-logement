$id: https://schemas.open-dpe.fr/chauffage/installation
$schema: https://json-schema.org/draft/2020-12/schema
title: Installation de chauffage
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  surface:
    $ref: /common/primitives#/$defs/surface
  comptage_individuel:
    title: Comptage individuel
    type: boolean
  reseau:
    title: Réseau de distribution
    type: [object, "null"]
    unevaluatedProperties: false
    properties:
      type_distribution:
        title: Type de distribution
        type: string
        x-enum: chauffage:type-distribution
        enum:
          - hydraulique
          - aeraulique
      presence_fluide_frigorigene:
        title: Distribution avec fluide frigorigène
        type: boolean
      presence_circulateur_externe:
        title: Présence d'un circulateur externe
        type: boolean
      niveaux_desservis:
        title: Nombre de niveaux desservis par le réseau
        type: integer
        minimum: 1
      isolation:
        title: Isolation du réseau
        type: [boolean, "null"]
      emetteurs:
        title: Liste des émetteurs associés
        type: array
        items:
          $ref: /common/primitives#/$defs/id
    required:
      - type_distribution
      - presence_fluide_frigorigene
      - presence_circulateur_externe
      - niveaux_desservis
      - isolation
      - emetteurs
    discriminator:
      propertyName: type_distribution
    oneOf:
      - title: Chauffage central avec distribution hydraulique
        type: object
        properties:
          type_distribution:
            const: hydraulique
          emetteurs:
            type: array
            minItems: 1
        required:
          - type_distribution
          - emetteurs
      - title: Chauffage central avec distribution aéraulique
        type: object
        properties:
          type_distribution:
            const: aeraulique
          emetteurs:
            type: array
            minItems: 0
            maxItems: 0
        required:
          - type_distribution
          - emetteurs
  solaire_thermique:
    title: Solaire thermique
    type: ["object", "null"]
    unevaluatedProperties: false
    properties:
      usage:
        title: Usages couverts par le solaire thermique
        type: string
        x-enum: chauffage:usage-solaire
        enum:
          - chauffage
          - chauffage_ecs
      annee_installation:
        $ref: /common/primitives#/$defs/annee_installation
      fch:
        title: Facteur de couverture solaire
        type: [number, "null"]
        minimum: 0
        maximum: 1
    required:
      - usage
      - annee_installation
      - fch
  regulation_centrale:
    $ref: "#/$defs/regulation"
  regulation_terminale:
    $ref: "#/$defs/regulation"
  generateurs:
    title: Liste des générateurs associés
    type: array
    minItems: 1
    items:
      $ref: /common/primitives#/$defs/id
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      paux:
        title: Puissance des auxiliaires en W
        type: number
      fch:
        title: Facteur de couverture solaire
        type: number
      int:
        title: Facteur d'intermittence
        type: number
      i0:
        title: Coefficient d'intermittence
        type: number
      ich:
        title: Inverse du rendement moyen
        type: number
      rd:
        title: Rendement de distribution moyen
        type: number
      re:
        title: Rendement d'émission moyen
        type: number
      rg:
        title: Rendement de génération moyen
        type: number
      rr:
        title: Rendement de régulation moyen
        type: number
      rdim:
        $ref: /common/primitives#/$defs/rdim
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - paux
      - fch
      - int
      - i0
      - ich
      - rd
      - re
      - rg
      - rr
      - rdim
      - consommations
required:
  - id
  - description
  - surface
  - comptage_individuel
  - reseau
  - generateurs
  - solaire_thermique
  - regulation_centrale
  - regulation_terminale
$defs:
  regulation:
    title: Régulation
    type: object
    unevaluatedProperties: false
    properties:
      presence_regulation:
        title: Présence d'une régulation
        type: boolean
      minimum_temperature:
        title: Régulation avec minimum de température
        type: [boolean, "null"]
      detection_presence:
        title: Détection de présence
        type: [boolean, "null"]
    required:
      - presence_regulation
    oneOf:
      - title: Régulation
        type: object
        properties:
          presence_regulation:
            const: true
          minimum_temperature:
            type: boolean
          detection_presence:
            type: boolean
        required:
          - presence_regulation
          - minimum_temperature
          - detection_presence
      - title: Pas de régulation
        type: object
        properties:
          presence_regulation:
            const: false
          minimum_temperature:
            enum: [false, null]
          detection_presence:
            enum: [false, null]
        required:
          - presence_regulation
