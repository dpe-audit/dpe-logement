$id: https://schemas.open-dpe.fr/chauffage/installation
$schema: https://json-schema.org/draft/2020-12/schema
title: Installation de chauffage
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  surface:
    $ref: /common/primitives#/$defs/surface
  type:
    title: Type d'installation de chauffage
    type: string
    x-enum: chauffage:type
    enum: [central, divise]
  installation_collective:
    title: Installation collective
    type: boolean
  comptage_individuel:
    title: Comptage individuel
    type: [boolean, "null"]
  regulation_terminale:
    title: Présence d'une régulation par pièce
    type: [boolean, "null"]
  programmation_centrale:
    title: Programmation centrale
    type: string
    x-enum: chauffage:type-programmation
    enum:
      - absent
      - central_sans_minimum_temperature
      - central_avec_minimum_temperature
      - central_collectif_sans_detection_presence
      - central_collectif_avec_detection_presence
  programmation_terminale:
    title: Programmation terminale
    type: [string, "null"]
    enum:
      - absent
      - terminal_avec_minimum_temperature
      - terminal_avec_minimum_temperature_detection_presence
      - null
  solaire_thermique:
    title: Solaire thermique
    type: ["object", "null"]
    unevaluatedProperties: false
    properties:
      usage:
        title: Usages couverts par le solaire thermique
        type: string
        x-enum: chauffage:usage-solaire
        enum:
          - chauffage
          - chauffage_ecs
      annee_installation:
        $ref: /common/primitives#/$defs/annee_installation
      fch:
        title: Facteur de couverture solaire
        type: [number, "null"]
        minimum: 0
        maximum: 1
    required:
      - usage
      - annee_installation
      - fch
  systemes:
    title: Liste des systèmes de chauffage
    type: array
    minItems: 1
    items:
      $ref: /chauffage/systeme
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      fch:
        title: Facteur de couverture solaire
        type: number
      int:
        title: Facteur d'intermittence
        type: number
      i0:
        title: Coefficient d'intermittence
        type: number
      ich:
        title: Inverse du rendement moyen
        type: number
      rdim:
        $ref: /common/primitives#/$defs/rdim
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - fch
      - int
      - i0
      - ich
      - rdim
      - consommations
required:
  - id
  - description
  - surface
  - type
  - installation_collective
  - programmation_centrale
  - solaire_thermique
  - systemes
oneOf:
  - title: Chauffage central collectif
    properties:
      type:
        const: central
      installation_collective:
        const: true
      comptage_individuel:
        type: boolean
      regulation_terminale:
        type: boolean
      programmation_centrale:
        enum:
          - absent
          - central_collectif_sans_detection_presence
          - central_collectif_avec_detection_presence
      programmation_terminale:
        const: null
        default: null
      systemes:
        contains:
          type: object
          properties:
            type:
              const: central
          required:
            - type
    required:
      - type
      - installation_collective
      - comptage_individuel
      - regulation_terminale
      - programmation_centrale
      - systemes
  - title: Chauffage central individuel
    properties:
      type:
        const: central
      installation_collective:
        const: false
      comptage_individuel:
        const: null
        default: null
      regulation_terminale:
        type: boolean
      programmation_centrale:
        enum:
          - absent
          - central_sans_minimum_temperature
          - central_avec_minimum_temperature
      programmation_terminale:
        type: string
        enum:
          - absent
          - terminal_avec_minimum_temperature
          - terminal_avec_minimum_temperature_detection_presence
      systemes:
        contains:
          type: object
          properties:
            type:
              const: central
          required:
            - type
    required:
      - type
      - installation_collective
      - regulation_terminale
      - programmation_centrale
      - programmation_terminale
      - systemes
  - title: Chauffage divisé
    properties:
      type:
        const: divise
      installation_collective:
        const: false
      comptage_individuel:
        const: null
        default: null
      regulation_terminale:
        const: null
        default: null
      programmation_centrale:
        enum:
          - absent
          - central_sans_minimum_temperature
          - central_avec_minimum_temperature
      programmation_terminale:
        type: string
        enum:
          - absent
          - terminal_avec_minimum_temperature
          - terminal_avec_minimum_temperature_detection_presence
      systemes:
        type: array
        items:
          type: object
          properties:
            type:
              const: divise
            reseau:
              type: "null"
          required:
            - type
            - reseau
    required:
      - type
      - installation_collective
      - programmation_centrale
      - programmation_terminale
      - systemes
