$id: https://schemas.open-dpe.fr/chauffage/generateur/generateur-electrique
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur électrique
type: object
properties:
  type:
    enum:
      - chaudiere
      - generateur_air_chaud
      - convecteur_bi_jonction
      - convecteur_electrique
      - panneau_rayonnant_electrique
      - plafond_rayonnant_electrique
      - plancher_rayonnant_electrique
      - radiateur_electrique
      - radiateur_electrique_accumulation
  energie:
    const: electricite
  bienergie:
    const: null
    default: null
  position:
    type: object
    properties:
      reseau_chaleur_id:
        const: null
        default: null
  signaletique:
    type: object
    properties:
      scop:
        const: null
        default: null
      mode_combustion:
        const: null
        default: null
      presence_ventouse:
        const: null
        default: null
      presence_regulation:
        const: null
        default: null
      pveilleuse:
        const: null
        default: null
      qp0:
        const: null
        default: null
      rpn:
        const: null
        default: null
      rpint:
        const: null
        default: null
      tfonc30:
        const: null
        default: null
      tfonc100:
        const: null
        default: null
required:
  - type
  - energie
  - position
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - title: Chaudière électrique
    properties:
      type:
        enum: [chaudiere, generateur_air_chaud]
      signaletique:
        type: object
        properties:
          label:
            const: null
            default: null
    required:
      - type
      - signaletique
  - title: Emetteur électrique
    type: object
    properties:
      type:
        not:
          const: chaudiere
      position:
        type: object
        properties:
          position_chaudiere:
            const: null
            default: null
          generateur_collectif:
            const: false
            default: false
          generateur_multi_batiment:
            const: false
            default: false
          position_volume_chauffe:
            const: true
            default: true
          generateur_mixte_id:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          label:
            title: Label
            type: [string, "null"]
            enum: [nf_performance, null]
    required:
      - type
      - position
      - signaletique
