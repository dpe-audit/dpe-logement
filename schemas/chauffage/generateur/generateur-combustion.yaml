$id: https://schemas.open-dpe.fr/chauffage/generateur/generateur-combustion
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur à combustion
type: object
properties:
  type:
    x-enum: chauffage:type-generateur
    enum:
      - chaudiere
      - generateur_air_chaud
      - cuisiniere
      - foyer_ferme
      - insert
      - poele
      - poele_bouilleur
      - radiateur_gaz
  energie:
    not:
      enum: [electricite, reseau_chaleur]
  bienergie:
    const: null
    default: null
  position:
    type: object
    properties:
      reseau_chaleur_id:
        const:
        default: null
  signaletique:
    type: object
    properties:
      scop:
        const: null
        default: null
required:
  - type
  - energie
  - position
  - signaletique
discriminator:
  propertyName: type
oneOf:
  - title: Chaudière à combustion
    properties:
      type:
        const: chaudiere
      signaletique:
        type: object
        properties:
          label:
            const: null
            default: null
    required:
      - type
      - signaletique
  - title: Poèle bouilleur
    properties:
      type:
        const: poele_bouilleur
      energie:
        enum: [bois_buche, bois_plaquette, bois_granule]
      bienergie:
        const: null
        default: null
      signaletique:
        type: object
        properties:
          label:
            const: null
            default: null
    required:
      - type
      - energie
      - signaletique
  - title: Poèle / Insert
    properties:
      type:
        enum: [cuisiniere, foyer_ferme, insert, poele]
      bienergie:
        const: null
        default: null
      position:
        type: object
        properties:
          position_chaudiere:
            const: null
            default: null
          generateur_collectif:
            const: false
            default: false
          generateur_multi_batiment:
            const: false
            default: false
          position_volume_chauffe:
            const: true
            default: true
          generateur_mixte_id:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          label:
            title: Label
            type: [string, "null"]
            enum: [flamme_verte, null]
          mode_combustion:
            const: null
            default: null
          presence_regulation:
            const: null
            default: null
          pveilleuse:
            const: null
            default: null
          qp0:
            const: null
            default: null
          rpn:
            const: null
            default: null
          rpint:
            const: null
            default: null
          tfonc30:
            const: null
            default: null
          tfonc100:
            const: null
            default: null
    required:
      - type
      - energie
      - position
      - signaletique
  - title: Générateur air chaud à combustion
    type: object
    properties:
      type:
        const: generateur_air_chaud
      bienergie:
        const: null
        default: null
      signaletique:
        type: object
        properties:
          mode_combustion:
            enum: [standard, condensation, null]
          label:
            const: null
            default: null
    required:
      - type
      - energie
      - signaletique
  - title: Radiateur à gaz
    type: object
    properties:
      type:
        const: radiateur_gaz
      energie:
        enum: [gaz_naturel, gpl]
      bienergie:
        const: null
        default: null
      position:
        type: object
        properties:
          position_chaudiere:
            const: null
            default: null
          generateur_collectif:
            const: false
            default: false
          generateur_multi_batiment:
            const: false
            default: false
          position_volume_chauffe:
            const: true
            default: true
          generateur_mixte_id:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          label:
            title: Label
            type: [string, "null"]
            enum: [flamme_verte, null]
          mode_combustion:
            const: null
            default: null
          presence_regulation:
            const: null
            default: null
          pveilleuse:
            const: null
            default: null
          qp0:
            const: null
            default: null
          rpint:
            const: null
            default: null
          tfonc30:
            const: null
            default: null
          tfonc100:
            const: null
            default: null
    required:
      - type
      - energie
      - position
      - signaletique
