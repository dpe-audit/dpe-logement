$id: https://schemas.open-dpe.fr/chauffage/generateur/generateur-thermodynamique
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur thermodynamique
type: object
properties:
  type:
    enum:
      - pac_air_air
      - pac_air_eau
      - pac_eau_eau
      - pac_eau_glycolee_eau
      - pac_geothermique
  energie:
    const: electricite
  position:
    type: object
    properties:
      reseau_chaleur_id:
        const: null
        default: null
required:
  - type
  - energie
  - position
discriminator:
  propertyName: bienergie
oneOf:
  - title: Pompe à chaleur
    type: object
    properties:
      bienergie:
        const:
        default: null
      position:
        type: object
        properties:
          position_chaudiere:
            const: null
            default: null
      signaletique:
        type: object
        properties:
          label:
            const: null
            default: null
          mode_combustion:
            const: null
            default: null
          presence_ventouse:
            const: null
            default: null
          presence_regulation:
            const: null
            default: null
          pveilleuse:
            const: null
            default: null
          qp0:
            const: null
            default: null
          rpn:
            const: null
            default: null
          rpint:
            const: null
            default: null
          tfonc30:
            const: null
            default: null
          tfonc100:
            const: null
            default: null
    required:
      - position
      - signaletique
  - title: Pompe à chaleur hybride
    properties:
      type:
        not:
          const: pac_air_air
      bienergie:
        not:
          const: null
      signaletique:
        type: object
        properties:
          label:
            const: null
            default: null
    required:
      - type
      - bienergie
      - signaletique
