$id: https://schemas.open-dpe.fr/chauffage/generateur/reseau-chaleur
$schema: https://json-schema.org/draft/2020-12/schema
title: Réseau de chaleur
type: object
properties:
  type:
    const: reseau_chaleur
  energie:
    const: reseau_chaleur
  bienergie:
    const: null
    default: null
  position:
    type: object
    properties:
      position_chaudiere:
        const: null
        default: null
      generateur_collectif:
        const: true
        default: true
      generateur_multi_batiment:
        const: true
        default: true
      position_volume_chauffe:
        const: false
        default: false
      generateur_mixte_id:
        const: null
        default: null
      reseau_chaleur_id:
        type: [string, "null"]
    required:
      - reseau_chaleur_id
  signaletique:
    type: object
    properties:
      pn:
        const: null
        default: null
      label:
        const: null
        default: null
      scop:
        const: null
        default: null
      mode_combustion:
        const: null
      presence_regulation:
        const: null
        default: null
      pveilleuse:
        const: null
        default: null
      qp0:
        const: null
        default: null
      rpn:
        const: null
        default: null
      rpint:
        const: null
        default: null
      tfonc30:
        const: null
        default: null
      tfonc100:
        const: null
        default: null
required:
  - type
  - energie
  - position
  - signaletique
