$id: https://schemas.open-dpe.fr/chauffage/generateur
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur de chauffage
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type de générateur
    type: [string, "null"]
    x-enum: chauffage:type-generateur
    enum:
      - chaudiere
      - convecteur_bi_jonction
      - convecteur_electrique
      - panneau_rayonnant_electrique
      - plafond_rayonnant_electrique
      - plancher_rayonnant_electrique
      - radiateur_electrique
      - radiateur_electrique_accumulation
      - generateur_air_chaud
      - pac_air_air
      - pac_air_eau
      - pac_eau_eau
      - pac_eau_glycolee_eau
      - pac_geothermique
      - cuisiniere
      - foyer_ferme
      - insert
      - poele
      - poele_bouilleur
      - radiateur_gaz
      - reseau_chaleur
      - null
  energie:
    title: Energie
    type: [string, "null"]
    x-enum: energie
    enum:
      - electricite
      - gaz_naturel
      - gpl
      - fioul
      - charbon
      - bois_buche
      - bois_plaquette
      - bois_granule
      - reseau_chaleur
      - null
  bienergie:
    title: Energie secondaire
    type: [string, "null"]
    x-enum: energie
    enum: [gaz_naturel, gpl, fioul, null]
  annee_installation:
    $ref: /common/primitives#/$defs/annee_installation
  position:
    title: Position
    type: object
    unevaluatedProperties: false
    properties:
      position_chaudiere:
        title: Position de la chaudière
        type: [string, "null"]
        x-enum: chauffage:position-chaudiere
        enum: [chaudiere_murale, chaudiere_sol, null]
      generateur_collectif:
        title: Générateur collectif d'eau chaude sanitaire
        type: boolean
      generateur_multi_batiment:
        title: Générateur multi bâtiment
        type: boolean
      position_volume_chauffe:
        title: Position du générateur à l'intérieur du volume chauffé
        type: boolean
      generateur_mixte_id:
        title: Identifiant du générateur mixte
        anyOf:
          - $ref: /common/primitives#/$defs/id
          - const: null
      reseau_chaleur_id:
        title: Identifiant du réseau de chaleur
        type: [string, "null"]
    required:
      - generateur_collectif
      - generateur_multi_batiment
      - position_volume_chauffe
    oneOf:
      - title: Générateur individuel
        type: object
        properties:
          generateur_collectif:
            const: false
          generateur_multi_batiment:
            const: false
          reseau_chaleur_id:
            const: null
        required:
          - generateur_collectif
          - generateur_multi_batiment
      - title: Générateur collectif
        type: object
        properties:
          generateur_collectif:
            const: true
          position_volume_chauffe:
            const: false
        required:
          - generateur_collectif
          - position_volume_chauffe
  signaletique:
    title: Fiche signalétique
    type: object
    unevaluatedProperties: false
    properties:
      pn:
        title: Puissance nominale en kW
        type: [number, "null"]
        exclusiveMinimum: 0
      label:
        title: Label du générateur
        type: [string, "null"]
        enum: [flamme_verte, nf_performance, null]
      scop:
        title: Coefficient de performance énergétique saisonnier
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 10
      mode_combustion:
        title: Mode de combustion
        type: [string, "null"]
        x-enum: chauffage:mode-combustion
        enum:
          - standard
          - basse_temperature
          - condensation
          - null
      presence_ventouse:
        title: Présence d'une ventouse
        type: [boolean, "null"]
      presence_regulation:
        title: Présence d'une régulation de combustion
        type: [boolean, "null"]
      pveilleuse:
        title: Puissance de la veilleuse en W
        type: [number, "null"]
        minimum: 0
      qp0:
        title: Pertes à l'arrêt en kW
        type: [number, "null"]
        exclusiveMinimum: 0
      rpn:
        title: Rendement à puissance nominale sur PCI
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 150
      rpint:
        title: Rendement à puissance intermédiaire sur PCI
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 150
      tfonc30:
        title: Température de fonctionnement à 30% de la puissance nominale en °C
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 150
      tfonc100:
        title: Température de fonctionnement à 100% de la puissance nominale en °C
        type: [number, "null"]
        exclusiveMinimum: 0
        maximum: 150
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      pn:
        title: Puissance nominale en kW
        type: number
      pdim:
        title: Puissance de dimensionnement en kW
        type: number
      pch:
        title: Puissance de dimensionnement de chauffage en kW
        type: number
      rg:
        title: Rendement de génération moyen
        type: number
      scop:
        title: Coefficient de performance énergétique saisonnier
        type: [number, "null"]
      rpn:
        title: Rendement à pleine charge sur PCI
        type: [number, "null"]
      rpint:
        title: Rendement à charge intermédiaire sur PCI
        type: [number, "null"]
      qp0:
        title: Pertes à l'arrêt en kW
        type: [number, "null"]
      pveilleuse:
        title: Puissance de la veilleuse en W
        type: [number, "null"]
      tfonc30:
        title: Température de fonctionnement à 30% de la puissance nominale en °C
        type: [number, "null"]
      tfonc100:
        title: Température de fonctionnement à 100% de la puissance nominale en °C
        type: [number, "null"]
      rdim:
        $ref: /common/primitives#/$defs/rdim
      pertes:
        $ref: /common/components#/$defs/pertes
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - pn
      - pdim
      - pch
      - rg
      - scop
      - rpn
      - rpint
      - qp0
      - pveilleuse
      - tfonc30
      - tfonc100
      - rdim
      - pertes
      - consommations
required:
  - id
  - description
  - type
  - energie
  - annee_installation
  - position
  - signaletique
oneOf:
  - $ref: /chauffage/generateur/generateur-combustion
  - $ref: /chauffage/generateur/generateur-electrique
  - $ref: /chauffage/generateur/chaudiere-thermodynamique
  - $ref: /chauffage/generateur/reseau-chaleur
  - $ref: /chauffage/generateur/generateur-inconnu
