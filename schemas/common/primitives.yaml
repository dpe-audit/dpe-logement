$id: https://schemas.open-dpe.fr/common/primitives
$schema: https://json-schema.org/draft/2020-12/schema
$defs:
  id:
    title: Identifiant
    type: string
    format: uuid
  date:
    type: string
    format: date
  annee:
    type: integer
    maximum: 2026
    minimum: 1900
  annee_construction:
    title: Année de construction
    anyOf:
      - $ref: "#/$defs/annee"
      - const: null
  annee_renovation:
    title: Année de dernière rénovation
    anyOf:
      - $ref: "#/$defs/annee"
      - const: null
  annee_installation:
    title: Année d'installation
    anyOf:
      - $ref: "#/$defs/annee"
      - const: null
  description:
    title: Description
    type: string
  surface:
    title: Surface exprimée en m²
    type: number
    exclusiveMinimum: 0
  hauteur:
    title: Hauteur exprimée en m
    type: number
    exclusiveMinimum: 0
  orientation:
    title: Orientation
    type: string
    x-enum: orientation
    enum: [nord, nord_est, est, sud_est, sud, sud_ouest, ouest, nord_ouest]
  orientation_cardinale:
    title: Orientation cardinale
    type: string
    enum: [nord, est, sud, ouest]
  inclinaison:
    title: Inclinaison
    type: number
    minimum: 0
    maximum: 90
  scenario:
    title: Scénario d'usage
    type: string
    x-enum: scenario
    enum: [conventionnel, depensier]
  usage:
    title: Usage
    type: string
    x-enum: usage
    enum: [chauffage, ecs, refroidissement, eclairage, auxiliaire]
  energie:
    title: Energie
    type: string
    x-enum: energie
    enum:
      - electricite
      - gaz_naturel
      - gpl
      - fioul
      - charbon
      - bois_buche
      - bois_plaquette
      - bois_granule
      - reseau_chaleur
      - reseau_froid
  rdim:
    title: Ratio de dimensionnement
    type: number
    exclusiveMinimum: 0
    maximum: 1
  apports:
    title: Apports gratuits en kWh/an
    type: number
    minimum: 0
  bef:
    title: Besoin d'énergie finale en kWh/an
    type: number
    minimum: 0
  cef:
    title: Consommation d'énergie finale en kWh/an
    type: number
    minimum: 0
  cep:
    title: Consommation d'énergie primaire en kWh/an
    type: number
    minimum: 0
  eges:
    title: Emissions de gaz à effet de serre en kgCO2/an
    type: number
    minimum: 0
  type_pertes:
    title: Type de pertes
    type: string
    x-enum: type-pertes
    enum: [generation, distribution, stockage]
  pertes:
    title: Pertes en Wh/an
    type: number
    minimum: 0
  pertes_recuperables:
    title: Pertes récupérables en Wh/an
    type: number
    minimum: 0
