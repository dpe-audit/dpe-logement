$id: https://schemas.open-dpe.fr/common/components
$schema: https://json-schema.org/draft/2020-12/schema
$defs:
  adresse:
    title: Adresse
    type: object
    additionalProperties: false
    properties:
      ban_id:
        title: Identifiant depuis la Base Adresse Nationale (BAN)
        description: Clé d'interopérabilité telle que définie dans la spécification du format d'échange BAL
        type: [string, "null"]
      nom:
        title: Numéro éventuel et nom de voie ou lieu dit
        type: string
      code_postal:
        title: Code postal de la commune
        type: string
      code_insee:
        title: Code INSEE de la commune
        type: string
      commune:
        title: Nom officiel de la commune
        type: string
    required:
      - ban_id
      - nom
      - code_postal
      - code_insee
      - commune
  moisItem:
    title: Valeur pour un mois
    type: object
    additionalProperties: true
    properties:
      mois:
        $ref: /common/primitives#/$defs/mois
    required:
      - mois
  moisCollection:
    title: Collection de valeurs pour les mois
    type: array
    items:
      $ref: "#/$defs/moisItem"
  consommationsItem:
    title: Consommation
    type: object
    additionalProperties: false
    properties:
      usage:
        $ref: /common/primitives#/$defs/usage
      energie:
        $ref: /common/primitives#/$defs/energie
      cef:
        $ref: /common/primitives#/$defs/cef
      cep:
        $ref: /common/primitives#/$defs/cep
      eges:
        $ref: /common/primitives#/$defs/eges
    required:
      - usage
      - energie
      - cef
      - cep
      - eges
  consommations:
    title: Consommations
    type: array
    items:
      $ref: "#/$defs/consommationsItem"
  pertesItem:
    title: Pertes
    type: object
    additionalProperties: false
    properties:
      usage:
        $ref: /common/primitives#/$defs/usage
      type:
        $ref: /common/primitives#/$defs/type_pertes
      pertes:
        $ref: /common/primitives#/$defs/pertes
      pertes_recuperables:
        $ref: /common/primitives#/$defs/pertes_recuperables
    required:
      - usage
      - type
      - pertes
      - pertes_recuperables
  pertes:
    title: Pertes
    type: array
    items:
      $ref: "#/$defs/pertesItem"
