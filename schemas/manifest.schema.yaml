$schema: https://json-schema.org/draft/2020-12/schema
title: Manifest
type: object
additionalProperties: false
properties:
  version:
    title: Version du schéma de données publiques
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}$"
  alias:
    title: Alias de la version
    type: string
    pattern: "^v[0-9]+\\.[0-9]+$"
  status:
    title: Statut de la version
    type: string
    enum: ["stable", "deprecated", "draft"]
  released:
    title: Date de publication de la version
    type: string
    format: date
  components:
    title: Composants de la version
    type: object
    patternProperties:
      "^.+$":
        $ref: "#/$defs/component"
required:
  - version
  - alias
  - status
  - released
  - components
$defs:
  component:
    title: Composant
    type: object
    properties:
      schema:
        title: URI du schéma
        type: string
        format: uri
      file:
        title: Chemin du fichier de données
        type: string
      changed:
        title: Indique si le composant a été modifié depuis la dernière version
        type: boolean
      breaking:
        title: Indique si les modifications du composant sont des changements de rupture
        type: boolean
        default: false
      changelog:
        title: Description des changements
        type: string
    if:
      properties:
        changed:
          const: true
    then:
      required:
        - changelog
    else:
      properties:
        breaking:
          const: false
    required:
      - schema
      - file
      - changed
