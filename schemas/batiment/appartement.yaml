$id: https://schemas.open-dpe.fr/batiment/appartement
$schema: https://json-schema.org/draft/2020-12/schema
title: Appartement visité
type: object
additionalProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  surface_habitable:
    title: Surface habitable en m²
    $ref: /common/primitives#/$defs/surface
  hauteur_sous_plafond:
    title: Hauteur sous plafond moyenne en m
    $ref: /common/primitives#/$defs/hauteur
  position:
    title: Position de l'appartement dans le bâtiment
    type: string
    x-enum: batiment:position-appartement
    enum: [rdc, etage_intermediaire, dernier_etage]
  typologie:
    title: Typologie d'appartement
    type: string
    x-enum: batiment:typologie-appartement
    enum: [T1, T2, T3, T4, T5, T6, T7]
required:
  - id
  - description
  - surface_habitable
  - hauteur_sous_plafond
  - position
  - typologie
