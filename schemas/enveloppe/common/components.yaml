$id: https://schemas.open-dpe.fr/enveloppe/common/components
$schema: https://json-schema.org/draft/2020-12/schema
title: Dictionnaire des propriétés communes
$defs:
  position:
    title: Position d'une paroi
    type: object
    unevaluatedProperties: false
    properties:
      surface:
        $ref: /common/primitives#/$defs/surface
      mitoyennete:
        $ref: /enveloppe/common/primitives#/$defs/mitoyennete
      local_non_chauffe_id:
        title: Identifiant du local non chauffé associé à la paroi
        anyOf:
          - $ref: /common/primitives#/$defs/id
          - const: null
    required:
      - surface
      - mitoyennete
    oneOf:
      - title: Paroi donnant sur un local non chauffé
        type: object
        properties:
          mitoyennete:
            const: local_non_chauffe
          local_non_chauffe_id:
            type: string
        required:
          - mitoyennete
          - local_non_chauffe_id
      - title: Autres cas
        type: object
        properties:
          mitoyennete:
            not:
              const: local_non_chauffe
          local_non_chauffe_id:
            type: null
        required:
          - mitoyennete
  isolation:
    title: Isolation d'une paroi
    type: object
    unevaluatedProperties: false
    properties:
      etat:
        title: Etat d'isolation
        type: [boolean, "null"]
      type:
        title: Type d'isolation
        anyOf:
          - $ref: /enveloppe/common/primitives#/$defs/type_isolation
          - const: null
      annee_installation:
        $ref: /common/primitives#/$defs/annee_installation
      epaisseur:
        title: Epaisseur de l'isolation en mm
        type: [number, "null"]
        exclusiveMinimum: 0
      resistance_thermique:
        title: Résistance thermique de l'isolation en m².K/W
        type: [number, "null"]
        exclusiveMinimum: 0
    required:
      - etat
    oneOf:
      - title: Paroi non isolée ou dont l'isolation n'est pas connue
        type: object
        properties:
          etat:
            enum: [false, null]
          type:
            const: null
          annee_installation:
            const: null
          epaisseur:
            const: null
          resistance_thermique:
            const: null
        required:
          - etat
      - title: Paroi isolée mais dont le type d'isolation n'est pas connu
        type: object
        properties:
          etat:
            const: true
          type:
            const: null
          annee_installation:
            const: null
          epaisseur:
            const: null
          resistance_thermique:
            const: null
        required:
          - etat
          - type
      - title: Paroi isolée
        type: object
        properties:
          etat:
            const: true
          type:
            type: string
        required:
          - etat
          - type
          - annee_installation
          - epaisseur
          - resistance_thermique
