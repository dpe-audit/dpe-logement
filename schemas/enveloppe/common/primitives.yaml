$id: https://schemas.open-dpe.fr/enveloppe/common/primitives
$schema: https://json-schema.org/draft/2020-12/schema
title: Dictionnaire des composants communs
$defs:
  inertie:
    title: Inertie
    type: string
    enum: [tres_lourde, lourde, moyenne, legere]
  inertie_paroi:
    title: Inertie de la paroi
    type: [string, "null"]
    x-enum: enveloppe:paroi:inertie
    enum: [lourde, legere, null]
  mitoyennete:
    title: Mitoyenneté
    type: string
    x-enum: enveloppe:paroi:mitoyennete
    enum:
      - exterieur
      - enterre
      - vide_sanitaire
      - terre_plein
      - sous_sol_non_chauffe
      - local_non_chauffe
      - local_non_residentiel
      - local_residentiel
      - local_non_accessible
  orientation:
    title: Orientation
    type: [string]
    x-enum: enveloppe:paroi:orientation
    enum: [nord, est, sud, ouest, horizontale]
  type_pose:
    title: Type de pose
    type: string
    x-enum: enveloppe:paroi:type-pose
    enum: [nu_exterieur, nu_interieur, tunnel]
  type_isolation:
    title: Type d'isolation
    type: string
    x-enum: enveloppe:paroi:type-isolation
    enum: [iti, ite, itr, iti_ite, itr_iti, itr_ite, itr_iti_ite]
  u:
    title: Coefficient de transmission thermique en W/m².K
    type: number
    exclusiveMinimum: 0
  u0_saisi:
    title: Coefficient de transmission thermique nu
    anyOf:
      - $ref: "#/$defs/u"
      - const: null
  u_saisi:
    title: Coefficient de transmission thermique
    anyOf:
      - $ref: "#/$defs/u"
      - const: null
  b:
    title: Coefficient de réduction des déperditions thermiques
    type: number
    minimum: 0
  sdep:
    title: Surface déperditive en m²
    type: number
    minimum: 0
  deperditions:
    title: Déperditions thermiques en W/K
    type: number
    minimum: 0
  sse:
    title: Surface sud équivalente en m²
    type: number
