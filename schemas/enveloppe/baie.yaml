$id: https://schemas.open-dpe.fr/enveloppe/baie
$schema: https://json-schema.org/draft/2020-12/schema
title: Baie
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type
    type: string
    x-enum: enveloppe:baie:type
    enum:
      - brique_verre_pleine
      - brique_verre_creuse
      - polycarbonate
      - fenetre_battante
      - fenetre_coulissante
      - porte_fenetre_coulissante
      - porte_fenetre_battante
  presence_protection_solaire:
    title: Présence de protection solaire
    type: boolean
  type_fermeture:
    title: Type de fermeture
    type: string
    x-enum: enveloppe:baie:type-fermeture
    enum:
      - sans_fermeture
      - jalousie_accordeon
      - fermeture_lames_orientables
      - venitiens_exterieurs_metal
      - volet_battant_avec_ajours_fixes
      - persiennes_avec_ajours_fixes
      - fermeture_sans_ajours
      - volets_roulants_aluminium
      - volets_roulants_pvc_bois_epaisseur_lte_12_mm
      - volets_roulants_pvc_bois_epaisseur_gt_12_mm
      - persienne_coulissante_epaisseur_lte_22_mm
      - persienne_coulissante_epaisseur_gt_22_mm
      - volet_battant_pvc_bois_epaisseur_lte_22_mm
      - volet_battant_pvc_bois_epaisseur_gt_22_mm
      - fermeture_isolee_sans_ajours
  annee_installation:
    $ref: /common/primitives#/$defs/annee_installation
  ug:
    title: Coefficient de transmission thermique du vitrage
    $ref: /enveloppe/common/primitives#/$defs/u_saisi
  uw:
    title: Coefficient de transmission thermique de la menuiserie
    $ref: /enveloppe/common/primitives#/$defs/u_saisi
  ujn:
    title: Coefficient de transmission thermique de la baie avec protections solaires
    $ref: /enveloppe/common/primitives#/$defs/u_saisi
  sw:
    title: Proportion d'énergie solaire transmise
    type: [number, "null"]
    minimum: 0
    maximum: 1
  position:
    title: Position
    type: object
    unevaluatedProperties: false
    properties:
      paroi_id:
        title: Identifiant de la paroi opaque associée à la baie
        anyOf:
          - $ref: /common/primitives#/$defs/id
          - const: null
      baie_id:
        title: Identifiant de la baie associée (double fenêtre)
        anyOf:
          - $ref: /common/primitives#/$defs/id
          - const: null
      type_pose:
        title: Type de pose
        anyOf:
          - $ref: /enveloppe/common/primitives#/$defs/type_pose
          - const: null
      inclinaison:
        $ref: /common/primitives#/$defs/inclinaison
      orientation:
        $ref: /enveloppe/common/primitives#/$defs/orientation
    required:
      - paroi_id
      - baie_id
      - type_pose
      - inclinaison
      - orientation
    allOf:
      - $ref: /enveloppe/common/components#/$defs/position
    oneOf:
      - title: Baie horizontale
        type: object
        properties:
          inclinaison:
            const: 0
          orientation:
            const: horizontale
        required:
          - inclinaison
          - orientation
      - title: Autres cas
        type: object
        properties:
          inclinaison:
            exclusiveMinimum: 0
          orientation:
            enum: [nord, est, sud, ouest]
        required:
          - inclinaison
          - orientation
  menuiserie:
    title: Menuiserie
    type: [object, "null"]
    additionalProperties: false
    properties:
      materiau:
        title: Matériau
        type: [string, "null"]
        x-enum: enveloppe:baie:materiau
        enum: [pvc, bois, bois_metal, metal, null]
      largeur_dormant:
        title: Largeur dormant en mm
        type: [number, "null"]
        exclusiveMinimum: 0
      presence_soubassement:
        title: Présence d'un soubassement
        type: boolean
      presence_joint:
        title: Présence de joint d'étanchéité
        type: [boolean, "null"]
      presence_retour_isolation:
        title: Présence d'un retour d'isolation
        type: [boolean, "null"]
      presence_rupteur_pont_thermique:
        title: Présence d'un rupteur de pont thermique
        type: [boolean, "null"]
    required:
      - materiau
      - largeur_dormant
      - presence_soubassement
      - presence_joint
      - presence_retour_isolation
      - presence_rupteur_pont_thermique
  vitrage:
    title: Vitrage
    type: object
    unevaluatedProperties: false
    properties:
      type:
        title: Type
        type: [string, "null"]
        x-enum: enveloppe:baie:type-vitrage
        enum:
          - brique_verre
          - polycarbonate
          - simple_vitrage
          - double_vitrage
          - double_vitrage_fe
          - triple_vitrage
          - triple_vitrage_fe
          - null
      nature_lame:
        title: Nature de la lame d'air
        type: [string, "null"]
        x-enum: enveloppe:baie:nature-lame-air
        enum: [air, argon, krypton, null]
      epaisseur_lame:
        title: Epaisseur de la lame d'air en mm
        type: [number, "null"]
        exclusiveMinimum: 0
    required:
      - type
    oneOf:
      - title: Vitrage simple
        properties:
          type:
            const: simple_vitrage
          nature_lame:
            const: null
          epaisseur_lame:
            const: null
        required:
          - type
      - title: Vitrage complexe
        properties:
          type:
            not:
              enum: [brique_verre, polycarbonate, simple_vitrage]
        required:
          - type
      - title: Autres
        properties:
          type:
            enum: [brique_verre, polycarbonate, null]
          nature_lame:
            const: null
          epaisseur_lame:
            const: null
        required:
          - type
  survitrage:
    title: Survitrage
    type: [object, "null"]
    additionalProperties: false
    properties:
      type:
        title: Type de survitrage
        type: [string, "null"]
        x-enum: enveloppe:baie:type-survitrage
        enum: [survitrage_simple, survitrage_fe, null]
      epaisseur_lame:
        title: Epaisseur de la lame d'air en mm
        type: [number, "null"]
        minimum: 0
    required:
      - type
      - epaisseur_lame
  masques:
    title: Liste des masques
    type: array
    items:
      $ref: /common/primitives#/$defs/id
  data:
    title: Données calculées
    description: >
      Lorsque `position.baie_id` est renseigné et que cette baie est la double fenêtre (baie le moins performante du complexe), 
      `u` est le Uw de cette baie et toutes les autres valeurs sont retournées à 0. Lorsque cette baie est la baie principale 
      du complexe, `u` est le Uw du complexe et toutes les autres valeurs sont calculées pour cette baie.
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      sw:
        title: Proportion d'énergie solaire transmise par la baie
        type: number
        minimum: 0
        maximum: 1
      sse:
        $ref: /enveloppe/common/primitives#/$defs/sse
      u:
        $ref: /enveloppe/common/primitives#/$defs/u
      b:
        $ref: /enveloppe/common/primitives#/$defs/b
      sdep:
        $ref: /enveloppe/common/primitives#/$defs/sdep
      dp:
        $ref: /enveloppe/common/primitives#/$defs/deperditions
    required:
      - sw
      - sse
      - u
      - b
      - sdep
      - dp
required:
  - id
  - description
  - type
  - presence_protection_solaire
  - type_fermeture
  - position
  - vitrage
  - masques
discriminator:
  propertyName: type
oneOf:
  - title: Baie en brique de verre
    type: object
    properties:
      type:
        enum: [brique_verre_pleine, brique_verre_creuse]
      vitrage:
        type: object
        properties:
          type:
            const: brique_verre
      menuiserie:
        const: null
    required:
      - type
      - vitrage
  - title: Baie en polycarbonate
    type: object
    properties:
      type:
        const: polycarbonate
      vitrage:
        type: object
        properties:
          type:
            const: polycarbonate
        required:
          - type
    required:
      - type
      - vitrage
  - title: Fenêtre ou porte fenêtre
    type: object
    properties:
      type:
        enum:
          - fenetre_battante
          - fenetre_coulissante
          - porte_fenetre_coulissante
          - porte_fenetre_battante
      vitrage:
        type: object
        properties:
          type:
            not:
              enum: [brique_verre, polycarbonate]
        required:
          - type
      menuiserie:
        type: object
    required:
      - type
      - vitrage
      - menuiserie
