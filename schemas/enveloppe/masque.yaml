$id: https://schemas.open-dpe.fr/enveloppe/masque
$schema: https://json-schema.org/draft/2020-12/schema
title: Masque
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type du masque
    type: string
    x-enum: enveloppe:masque:type
    enum:
      - homogene
      - non_homogene
      - fond_balcon
      - fond_et_flanc_loggias
      - balcon_ou_auvent
      - paroi_laterale_sans_obstacle_au_sud
      - paroi_laterale_avec_obstacle_au_sud
  orientation:
    title: Orientation
    anyOf:
      - $ref: /common/primitives#/$defs/orientation_cardinale
      - const: null
  hauteur:
    title: Hauteur du masque en angle
    type: [number, "null"]
    exclusiveMinimum: 0
    exclusiveMaximum: 90
  profondeur:
    title: Profondeur du masque en m
    type: [number, "null"]
    exclusiveMinimum: 0
  secteur:
    title: Secteur
    type: [string, "null"]
    x-enum: enveloppe:masque:secteur
    enum: [lateral, lateral_sud, central, central_sud, null]
required:
  - id
  - description
  - type
discriminator:
  propertyName: type
oneOf:
  - title: Masque lointain homogène
    type: object
    properties:
      type:
        const: homogene
      orientation:
        type: string
      hauteur:
        type: number
      secteur:
        const: null
    required:
      - type
      - orientation
      - hauteur
  - title: Masque lointain non homogène
    type: object
    properties:
      type:
        const: non_homogene
      orientation:
        type: string
      hauteur:
        type: number
      secteur:
        type: string
    required:
      - type
      - orientation
      - hauteur
      - secteur
    anyOf:
      - title: Façade au Sud ou Nord
        type: object
        properties:
          orientation:
            enum: [nord, sud]
          secteur:
            enum: [lateral, central]
        required:
          - orientation
          - secteur
      - title: Façade Est ou Ouest
        type: object
        properties:
          orientation:
            enum: [est, ouest]
          secteur:
            enum: [lateral, lateral_sud, central, central_sud]
        required:
          - orientation
          - secteur
  - title: Masque proche - Paroi latérale
    type: object
    properties:
      type:
        enum:
          - paroi_laterale_sans_obstacle_au_sud
          - paroi_laterale_avec_obstacle_au_sud
      orientation:
        const: null
      hauteur:
        const: null
      secteur:
        const: null
    required:
      - type
  - title: Masque proche - Baie en fond de balcon ou fond et flanc de loggias
    type: object
    properties:
      type:
        enum:
          - fond_balcon
          - fond_et_flanc_loggias
      orientation:
        type: string
      profondeur:
        type: number
      secteur:
        const: null
    required:
      - type
      - orientation
      - profondeur
  - title: Masque proche - Baie sous un balcon ou auvent
    type: object
    properties:
      type:
        const: balcon_ou_auvent
      profondeur:
        type: number
      orientation:
        const: null
      secteur:
        const: null
    required:
      - type
      - profondeur
