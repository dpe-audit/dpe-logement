$id: https://schemas.open-dpe.fr/enveloppe/local-non-chauffe
$schema: https://json-schema.org/draft/2020-12/schema
title: Local non chauffé
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type
    type: string
    x-enum: enveloppe:local-non-chauffe:type
    enum:
      - garage
      - cellier
      - espace_tampon_solarise
      - comble_fortement_ventile
      - comble_faiblement_ventile
      - comble_tres_faiblement_ventile
      - circulation_sans_ouverture_exterieure
      - circulation_avec_ouverture_exterieure
      - circulation_avec_bouche_ou_gaine_desenfumage_ouverte
      - hall_entree_avec_fermeture_automatique
      - hall_entree_sans_fermeture_automatique
      - garage_collectif
      - autres
  parois:
    title: Liste des parois
    type: array
    items:
      title: Paroi
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: /common/primitives#/$defs/id
        description:
          $ref: /common/primitives#/$defs/description
        isolation:
          title: État d'isolation de la paroi
          type: [boolean, "null"]
        position:
          title: Position
          type: object
          properties:
            mitoyennete:
              $ref: /enveloppe/common/primitives#/$defs/mitoyennete
            surface:
              $ref: /common/primitives#/$defs/surface
          required:
            - mitoyennete
            - surface
      required:
        - id
        - description
        - isolation
        - position
  baies:
    title: Liste des baies
    type: array
    items:
      title: Baie
      type: object
      unevaluatedProperties: false
      properties:
        id:
          $ref: /common/primitives#/$defs/id
        description:
          $ref: /common/primitives#/$defs/description
        type_vitrage:
          title: Type
          type: [string, "null"]
          x-enum: enveloppe:baie:type-vitrage
          enum:
            - brique_verre
            - polycarbonate
            - simple_vitrage
            - double_vitrage
            - double_vitrage_fe
            - triple_vitrage
            - triple_vitrage_fe
            - null
        materiau_menuiserie:
          title: Matériau
          type: [string, "null"]
          x-enum: enveloppe:baie:materiau
          enum: [pvc, bois, bois_metal, metal, null]
        presence_rupteur_pont_thermique:
          title: Présence d'un rupteur de pont thermique
          type: [boolean, "null"]
        position:
          title: Position de la baie
          type: object
          unevaluatedProperties: false
          properties:
            surface:
              $ref: /common/primitives#/$defs/surface
            mitoyennete:
              $ref: /enveloppe/common/primitives#/$defs/mitoyennete
            orientation:
              $ref: /enveloppe/common/primitives#/$defs/orientation
            inclinaison:
              $ref: /common/primitives#/$defs/inclinaison
          required:
            - surface
            - mitoyennete
            - inclinaison
            - orientation
          oneOf:
            - title: Baie horizontale
              type: object
              properties:
                inclinaison:
                  const: 0
                orientation:
                  const: horizontale
              required:
                - inclinaison
                - orientation
            - title: Autres cas
              type: object
              properties:
                inclinaison:
                  exclusiveMinimum: 0
                orientation:
                  enum: [nord, est, sud, ouest]
              required:
                - inclinaison
                - orientation
      required:
        - id
        - description
        - materiau_menuiserie
        - type_vitrage
        - position
      discriminator:
        propertyName: type
      oneOf:
        - title: Baie vitrée
          type: object
          properties:
            type_vitrage:
              enum: [brique_verre, polycarbonate]
            materiau_menuiserie:
              const: null
          required:
            - type_vitrage
        - title: Autres cas
          type: object
          properties:
            type_vitrage:
              not:
                enum: [brique_verre, polycarbonate]
          required:
            - type_vitrage
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      b:
        title: Coefficient de réduction des déperditions thermiques
        type: number
        minimum: 0
        maximum: 1
      sse:
        title: Surface sud équivalente en m²
        type: number
        minimum: 0
    required:
      - b
      - sse
required:
  - id
  - description
  - type
  - parois
  - baies
