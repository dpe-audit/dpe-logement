$id: https://schemas.open-dpe.fr/enveloppe/niveau
$schema: https://json-schema.org/draft/2020-12/schema
title: Niveau
type: object
additionalProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  surface:
    $ref: /common/primitives#/$defs/surface
  inertie_paroi_verticale:
    title: Inertie des parois verticales
    $ref: /enveloppe/common/primitives#/$defs/inertie_paroi
  inertie_plancher_bas:
    title: Inertie des planchers bas
    $ref: /enveloppe/common/primitives#/$defs/inertie_paroi
  inertie_plancher_haut:
    title: Inertie des planchers hauts
    $ref: /enveloppe/common/primitives#/$defs/inertie_paroi
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      inertie:
        $ref: /enveloppe/common/primitives#/$defs/inertie
    required:
      - inertie
required:
  - id
  - description
  - surface
  - inertie_paroi_verticale
  - inertie_plancher_bas
  - inertie_plancher_haut
