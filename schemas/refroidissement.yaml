$id: https://schemas.open-dpe.fr/refroidissement
$schema: https://json-schema.org/draft/2020-12/schema
title: Refroidissement
type: object
unevaluatedProperties: false
properties:
  generateurs:
    title: Liste des générateurs
    description: Le nombre de générateurs doit être égal au nombre de générateurs uniques référencés dans les installations.
    type: array
    items:
      $ref: /refroidissement/generateur
  installations:
    title: Liste des installations
    type: array
    items:
      $ref: /refroidissement/installation
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      ai:
        title: Apports internes
        $ref: /common/primitives#/$defs/apports
      as:
        title: Apports solaires
        $ref: /common/primitives#/$defs/apports
      bef:
        $ref: /common/primitives#/$defs/bef
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - ai
      - as
      - bef
      - consommations
required:
  - generateurs
  - installations
