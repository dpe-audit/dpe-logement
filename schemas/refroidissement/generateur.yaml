$id: https://schemas.open-dpe.fr/refroidissement/generateur
$schema: https://json-schema.org/draft/2020-12/schema
title: Générateur de refroidissement
type: object
unevaluatedProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  type:
    title: Type de générateur
    type: string
    x-enum: refroidissement:type-generateur
    enum:
      - pac_air_air
      - pac_air_eau
      - pac_eau_eau
      - pac_eau_glycolee_eau
      - pac_geothermique
      - autre_systeme_thermodynamique
      - autre
      - reseau_froid
  energie:
    title: Énergie utilisée par le générateur
    x-enum: energie
    enum: [electricite, gaz_naturel, gpl, reseau_froid]
  annee_installation:
    $ref: /common/primitives#/$defs/annee_installation
  seer:
    title: Coefficient d'efficience énergétique saisonnier
    type: [number, "null"]
    exclusiveMinimum: 0
  reseau_froid_id:
    title: Identifiant unique du réseau de froid
    type: [string, "null"]
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      eer:
        title: Coefficient d'efficacité énergétique
        type: number
        exclusiveMinimum: 0
      rdim:
        $ref: /common/primitives#/$defs/rdim
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - eer
      - rdim
      - consommations
required:
  - id
  - description
  - type
  - energie
discriminator:
  propertyName: type
oneOf:
  - title: Pompe à chaleur
    type: object
    properties:
      type:
        enum:
          - pac_air_air
          - pac_air_eau
          - pac_eau_eau
          - pac_eau_glycolee_eau
          - pac_geothermique
          - autre_systeme_thermodynamique
      energie:
        const: electricite
      reseau_froid_id:
        const: null
    required:
      - type
      - energie
  - title: Climatiseur
    type: object
    properties:
      type:
        const: autre
      energie:
        enum:
          - electricite
          - gaz_naturel
          - gpl
      reseau_froid_id:
        const: null
    required:
      - type
      - energie
  - title: Réseau de froid
    type: object
    properties:
      type:
        const: reseau_froid
      energie:
        const: reseau_froid
    required:
      - type
      - energie
