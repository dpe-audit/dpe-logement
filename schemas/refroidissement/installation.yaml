$id: https://schemas.open-dpe.fr/refroidissement/installation
$schema: https://json-schema.org/draft/2020-12/schema
title: Installation de refroidissement
type: object
additionalProperties: false
properties:
  id:
    $ref: /common/primitives#/$defs/id
  description:
    $ref: /common/primitives#/$defs/description
  surface:
    title: Surface couverte par l'installation en m²
    $ref: /common/primitives#/$defs/surface
  generateurs:
    title: Liste des générateurs de refroidissement associés
    type: array
    minItems: 1
    items:
      $ref: /common/primitives#/$defs/id
  data:
    title: Données calculées
    type: object
    readOnly: true
    additionalProperties: false
    properties:
      rdim:
        $ref: /common/primitives#/$defs/rdim
      consommations:
        $ref: /common/components#/$defs/consommations
    required:
      - rdim
      - consommations
required:
  - id
  - description
  - surface
  - generateurs
